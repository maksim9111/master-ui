version: "3.9"

services:
  client:
    build:
      context: ./apps/client
      dockerfile: Dockerfile
    container_name: master_client
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./apps/client:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - ./.env
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: 3000
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      NEXT_PUBLIC_CMS_URL: ${NEXT_PUBLIC_CMS_URL}
      STRAPI_API_URL: ${STRAPI_API_URL}
      STRAPI_API_TOKEN: ${STRAPI_API_TOKEN}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      NOTIFICATION_EMAIL: ${NOTIFICATION_EMAIL}
    depends_on:
      - backend
    networks:
      - master_network

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: master_backend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./apps/backend:/app
      - /app/node_modules
      - ./data/strapi/uploads:/app/public/uploads
    env_file:
      - ./.env
    ports:
      - "1337:1337"
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 1337
      APP_KEYS: ${APP_KEYS}
      API_TOKEN_SALT: ${API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      DATABASE_CLIENT: ${DATABASE_CLIENT}
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_SSL: ${DATABASE_SSL}
    depends_on:
      - postgres
    networks:
      - master_network

  postgres:
    image: postgres:16-alpine
    container_name: master_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - master_network

  nginx:
    image: nginx:1.27-alpine
    container_name: master_nginx
    restart: unless-stopped
    depends_on:
      - client
      - backend
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - master_network

volumes:
  postgres_data:

networks:
  master_network:
    driver: bridge